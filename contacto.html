<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contacto | G & G Asesores Tributarios</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;}

/* HERO */
.sw-hero{
  background:linear-gradient(135deg,#0e3d92,#1b78c1);
  color:white;
  text-align:center;
  padding:70px 20px;
}

/* CARDS */
.cards-section{padding:60px 20px;text-align:center;}
.cards-grid{display:flex;justify-content:center;gap:25px;flex-wrap:wrap;}
.service-card{
  width:320px;
  background:#f8faff;
  padding:25px;
  border-radius:12px;
  border:1px solid #e0e8f5;
  transition:.3s;
}
.service-card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* CONTACTO */
.contact-section-horizontal{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.contact-form input,
.contact-form textarea{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

.contact-form button{
  background:#0e3d92;
  color:white;
  padding:12px;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

/* REDES */
.social-section{
  padding:60px 20px;
  text-align:center;
  background:#f0f4fb;
}

.social-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  max-width:900px;
  margin:auto;
}

.social-block{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.social-block iframe{
  width:100%;
  max-width:380px;
  height:620px;
  border-radius:12px;
}

@media(max-width:700px){
  .social-grid{grid-template-columns:1fr;}
  .contact-section-horizontal{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="sw-hero">
<h1>Contáctanos</h1>
<p>Estamos listos para ayudarte</p>
</section>

<!-- CONTACTO -->
<div class="contact-section-horizontal">

<div>
<h2>Contáctanos</h2>
<p>Estamos listos para ayudarte con asesoría contable.</p>
</div>

<form class="contact-form">
<input type="text" name="name" placeholder="Tu nombre" required>
<input type="email" name="email" placeholder="Tu correo" required>
<textarea name="message" placeholder="Mensaje" required></textarea>
<button type="submit">Enviar</button>
</form>

</div>

<!-- REDES -->
<section class="social-section">
<h2>Síguenos en redes</h2>

<div class="social-grid">

<!-- TIKTOK -->
<div class="social-block">
<h3><i class="fa-brands fa-tiktok"></i> TikTok</h3>
<iframe src="https://www.tiktok.com/embed/7572641018500123911" frameborder="0" allowfullscreen></iframe>
</div>

<!-- FACEBOOK -->
<div class="social-block">
<h3><i class="fa-brands fa-facebook"></i> Facebook</h3>
<iframe src="https://www.facebook.com/plugins/video.php?href=https%3A%2F%2Fwww.facebook.com%2Freel%2F875856031733774&show_text=false" frameborder="0" allowfullscreen></iframe>
</div>

</div>
</section>

<!-- FOOTER -->
<footer style="text-align:center;padding:20px;">
© 2026 Guijarro & Guijarro
</footer>

<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("xynip590u3fLL8eHU");
})();

document.querySelector(".contact-form").addEventListener("submit", function(e){
  e.preventDefault();

  const btn = this.querySelector("button");
  btn.textContent = "Enviando...";
  btn.disabled = true;

  emailjs.send("service_mrb3u79","template_tq7xavd",{
    from_name: this.name.value,
    from_email: this.email.value,
    message: this.message.value
  })
  .then(()=>{
    alert("✅ Mensaje enviado correctamente");
    this.reset();
    btn.textContent = "Enviar";
    btn.disabled = false;
  })
  .catch(()=>{
    alert("❌ Error al enviar");
    btn.textContent = "Enviar";
    btn.disabled = false;
  });
});
</script>
</body>
</html>
