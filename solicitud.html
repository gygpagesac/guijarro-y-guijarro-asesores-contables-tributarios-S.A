<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitud de Proceso | G & G Asesores Tributarios</title>
  <link rel="icon" type="image/png" href="IMAGENES/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #f0f0f0; }
    .solicitud-container { max-width: 750px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    .solicitud-header { background: #0e3d92; color: white; padding: 2rem; }
    .solicitud-header h2 { font-size: 1.3rem; }
    .solicitud-header p { font-size: 0.85rem; color: #aac4ff; margin-top: 4px; }
    .solicitud-body { padding: 2rem; }
    .solicitud-body h3 { font-size: 1rem; color: #1c1c1c; margin: 1.5rem 0 1rem; border-bottom: 2px solid #f8b700; padding-bottom: 6px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.82rem; color: #666; font-weight: 600; }
    input, select, textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; font-family: inherit; width: 100%; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #0e3d92; }
    textarea { resize: vertical; min-height: 80px; }
    .persona-card { background: #f8f9ff; border: 1px solid #dde; border-radius: 8px; padding: 1rem; margin-top: 0.8rem; }
    .persona-card h4 { font-size: 0.9rem; color: #0e3d92; margin-bottom: 0.8rem; font-weight: 700; }
    .btn-enviar { width: 100%; padding: 12px; background: #0e3d92; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem; }
    .btn-enviar:hover { background: #0b2f70; }
    .btn-volver { width: 100%; padding: 12px; background: #f0f0f0; color: #333; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; text-align: center; text-decoration: none; display: block; }
    .btn-volver:hover { background: #e0e0e0; }
    #mensaje { text-align: center; margin-top: 10px; font-size: 0.9rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="solicitud-container">
  <div class="solicitud-header">
    <h2>📋 Solicitud de Proceso</h2>
    <p>Complete los datos para enviar su solicitud a nuestro equipo</p>
  </div>

  <div class="solicitud-body">

    <h3>Detalles del Proceso</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Tipo de Declaración</label>
        <select id="tipo_declaracion">
          <option value="">Selecciona...</option>
          <option value="iva">IVA Mensual</option>
          <option value="renta">Impuesto a la Renta</option>
          <option value="rimpe">RIMPE</option>
          <option value="anexo_rdep">Anexo RDEP</option>
          <option value="anexo_ats">Anexo ATS</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label>Período Fiscal</label>
        <input type="month" id="periodo_fiscal" />
      </div>
      <div class="form-group">
        <label>Fecha Límite</label>
        <input type="date" id="fecha_limite" />
      </div>
      <div class="form-group">
        <label>Documentos Disponibles</label>
        <select id="documentos">
          <option value="">Selecciona...</option>
          <option value="todos">Todos los documentos</option>
          <option value="parcial">Documentos parciales</option>
          <option value="ninguno">Aún no los tengo</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Observaciones o Comentarios</label>
        <textarea id="observaciones" placeholder="Describe cualquier detalle importante..."></textarea>
      </div>
    </div>

    <h3>¿Para cuántas personas son los trámites?</h3>
    <div class="form-group" style="max-width:200px;">
      <label>Número de personas</label>
      <input type="number" id="num_personas" min="1" max="20" value="1" />
    </div>

    <div id="personas-container"></div>

    <button class="btn-enviar" id="btnEnviar">📤 Enviar Solicitud</button>
    <a class="btn-volver" href="perfil.html">← Volver al Perfil</a>
    <p id="mensaje"></p>

  </div>
</div>

<script type="module" src="solicitud.js"></script>
</body>
</html>
