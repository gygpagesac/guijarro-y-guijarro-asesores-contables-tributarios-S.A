<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil | G & G Asesores Tributarios</title>
  <link rel="icon" type="image/png" href="IMAGENES/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #f0f0f0; }
    .perfil-container { max-width: 700px; margin: 40px auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    .perfil-header { background: #0e3d92; color: white; padding: 2rem; display: flex; align-items: center; gap: 1.5rem; }
    .perfil-avatar { width: 70px; height: 70px; background: #f8b700; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #0e3d92; }
    .perfil-header h2 { font-size: 1.2rem; }
    .perfil-header p { font-size: 0.85rem; color: #aac4ff; margin-top: 4px; }
    .perfil-body { padding: 2rem; }
    .perfil-body h3 { font-size: 1rem; color: #1c1c1c; margin: 1.5rem 0 1rem; border-bottom: 2px solid #f8b700; padding-bottom: 6px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.82rem; color: #666; font-weight: 600; }
    input, select, textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; font-family: inherit; width: 100%; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #0e3d92; }
    .btn-guardar { width: 100%; padding: 12px; background: #0e3d92; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem; }
    .btn-guardar:hover { background: #0b2f70; }
    .btn-solicitar { width: 100%; padding: 12px; background: #f8b700; color: #0e3d92; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .btn-solicitar:hover { background: #e0a500; }
    .btn-inicio { width: 100%; padding: 12px; background: #f0f0f0; color: #333; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; text-align: center; text-decoration: none; display: block; }
    .btn-inicio:hover { background: #e0e0e0; }
    #mensaje { text-align: center; margin-top: 10px; font-size: 0.9rem; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="perfil-container">
  <div class="perfil-header">
    <div class="perfil-avatar"><i class="fa-solid fa-user"></i></div>
    <div>
      <h2 id="header-nombre">Mi Perfil</h2>
      <p id="header-correo"></p>
    </div>
  </div>

  <div class="perfil-body">

    <h3>Datos Personales</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Nombres</label>
        <input type="text" id="nombres" placeholder="Tus nombres" />
      </div>
      <div class="form-group">
        <label>Apellidos</label>
        <input type="text" id="apellidos" placeholder="Tus apellidos" />
      </div>
      <div class="form-group">
        <label>RUC / Cédula</label>
        <input type="text" id="ruc" placeholder="Número de RUC o cédula" />
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="text" id="telefono" placeholder="Tu teléfono" />
      </div>
      <div class="form-group">
        <label>Ciudad</label>
        <input type="text" id="ciudad" placeholder="Tu ciudad" />
      </div>
    </div>

    <h3>Información Tributaria</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Tipo de Persona</label>
        <select id="tipo_persona">
          <option value="">Selecciona...</option>
          <option value="natural">Persona Natural</option>
          <option value="juridica">Persona Jurídica</option>
        </select>
      </div>
      <div class="form-group">
        <label>Régimen Tributario</label>
        <select id="regimen">
          <option value="">Selecciona...</option>
          <option value="rimpe_emprendedor">RIMPE Emprendedor</option>
          <option value="rimpe_negocio">RIMPE Negocio Popular</option>
          <option value="general">Régimen General</option>
          <option value="no_obligado">No obligado a llevar contabilidad</option>
          <option value="obligado">Obligado a llevar contabilidad</option>
        </select>
      </div>
    </div>

    <button class="btn-guardar" id="btnGuardar">💾 Guardar Perfil</button>
    <button class="btn-solicitar" onclick="window.location.href='solicitud.html'">📋 Solicitar Proceso</button>
    <a class="btn-inicio" href="index.html">🏠 Volver al Inicio</a>
    <p id="mensaje"></p>

    <h3>📬 Bandeja de Entrada</h3>
    <div id="bandeja-container">
      <p style="color:#999; font-size:0.9rem;">Cargando mensajes...</p>
    </div>

    <!-- Formulario de respuesta -->
    <div id="respuesta-container" style="display:none; margin-top:1rem;">
      <h3>✉️ Responder</h3>
      <div class="form-group full" style="margin-top:0.5rem;">
        <label>Asunto</label>
        <input type="text" id="respuesta-asunto" placeholder="Asunto de tu respuesta" />
      </div>
      <div class="form-group full" style="margin-top:0.5rem;">
        <label>Mensaje</label>
        <textarea id="respuesta-mensaje" placeholder="Escribe tu respuesta..." style="min-height:100px;"></textarea>
      </div>
      <button class="btn-guardar" id="btnResponder" style="margin-top:0.5rem;">📤 Enviar Respuesta</button>
      <button class="btn-inicio" id="btnCancelarRespuesta" style="margin-top:0.5rem;">Cancelar</button>
    </div>

  </div>
</div>

<script type="module" src="perfil.js"></script>
</body>
</html>
