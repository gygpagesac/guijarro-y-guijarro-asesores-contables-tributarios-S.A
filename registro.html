<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario | Sistema Corporativo</title>
    <style>
        /* === ESTILOS EXCLUSIVOS REGISTRO === */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container { width: 100%; max-width: 600px; padding: 20px; }

        .auth-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid #f8b700;
            text-align: center;
        }

        h1 { color: #0e3d92; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: #0e3d92; font-weight: bold; margin-bottom: 8px; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }

        .row { display: flex; gap: 15px; margin-bottom: 10px; }
        .row .input-group { flex: 1; }

        .btn-success {
            width: 100%;
            padding: 14px;
            background-color: #f8b700;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-success:hover { background-color: #e0a600; }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #0e3d92;
            border: 2px solid #0e3d92;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        hr { margin: 25px 0; border: 0; border-top: 1px solid #eee; }

        @media (max-width: 500px) {
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Crear Cuenta</h1>
            
            <form id="registerForm">
                <div class="input-group">
                    <label>Nombre Completo / Razón Social</label>
                    <input type="text" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>RUC / Cédula</label>
                        <input type="text" placeholder="1712345678001" required>
                    </div>
                    <div class="input-group">
                        <label>Teléfono</label>
                        <input type="text" placeholder="0998765432" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="correo@dominio.com" required>
                </div>

                <div class="input-group">
                    <label>Contraseña Nueva</label>
                    <input type="password" placeholder="Mínimo 8 caracteres" required>
                </div>
                
                <button type="submit" class="btn-success">REGISTRARME</button>
                
                <hr>
                <button type="button" class="btn-secondary" onclick="window.location.href='login.html'">YA TENGO CUENTA</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Registro enviado con éxito.");
        };
    </script>
</body>
</html>
