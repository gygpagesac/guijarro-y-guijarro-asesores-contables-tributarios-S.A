<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sistema Corporativo</title>
    <style>
        /* === ESTILOS EXCLUSIVOS LOGIN === */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container { width: 100%; max-width: 450px; padding: 20px; }

        .auth-box {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid #f8b700;
            text-align: center;
        }

        h1 { color: #0e3d92; font-size: 24px; margin-bottom: 5px; text-transform: uppercase; }
        h3 { color: #666; font-size: 14px; margin-bottom: 30px; font-weight: 400; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: #0e3d92; font-weight: bold; margin-bottom: 8px; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #0e3d92; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #0e3d92;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-primary:hover { background-color: #0a2d6e; }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #0e3d92;
            border: 2px solid #f8b700;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        hr { margin: 25px 0; border: 0; border-top: 1px solid #eee; }
        .divider { margin: 15px 0; color: #999; font-size: 12px; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Bienvenido</h1>
            <h3>Ingresa a tu cuenta</h3>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Correo Electrónico / RUC</label>
                    <input type="text" id="user" placeholder="ejemplo@empresa.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="pass" placeholder="********" required>
                </div>
                
                <button type="submit" class="btn-primary">INGRESAR</button>
                
                <hr>
                <div class="divider">¿Aún no tienes cuenta?</div>
                <button type="button" class="btn-secondary" onclick="window.location.href='registro.html'">CREAR UNA CUENTA</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            console.log("Intentando iniciar sesión...");
            // Aquí iría tu lógica de validación
        };
    </script>
</body>
</html>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
